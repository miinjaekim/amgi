name: Mobile Typecheck

on:
  pull_request:
    paths:
      - 'apps/mobile/**'
      - 'packages/core/**'

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck mobile
        working-directory: apps/mobile
        run: npx tsc --noEmit
