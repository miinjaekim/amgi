name: Mobile OTA Update

on:
  push:
    branches: [main]
    paths:
      - 'apps/mobile/**'
      - 'packages/core/**'

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck mobile
        working-directory: apps/mobile
        run: npx tsc --noEmit

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish EAS Update
        working-directory: apps/mobile
        run: eas update --channel default --message "Auto-update from ${{ github.sha }}" --non-interactive
