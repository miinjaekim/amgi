name: Mobile OTA Update

# OTA delivery was abandoned on 2026-07-23 — updates published here never
# reached the TestFlight build and debugging dead-ended. Mobile now ships via
# Expo Go for development and production builds for release, so publishing on
# every push to main just burned CI time and EAS update quota on updates
# nobody received.
#
# Kept as manual-only rather than deleted, so the pipeline is still here if OTA
# is ever revisited. To re-enable automatic publishing, restore the push
# trigger below.
#
#  push:
#    branches: [main]
#    paths:
#      - 'apps/mobile/**'
#      - 'packages/core/**'
on:
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck mobile
        working-directory: apps/mobile
        run: npx tsc --noEmit

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Publish EAS Update
        working-directory: apps/mobile
        run: eas update --channel default --message "Auto-update from ${{ github.sha }}" --non-interactive
